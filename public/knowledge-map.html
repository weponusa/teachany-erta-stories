<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeachAny 知识图谱 · 语文阅读</title>
<style>
:root {
  --bg: #0f172a;
  --card: rgba(30, 41, 59, 0.65);
  --primary: #3b82f6;
  --secondary: #06b6d4;
  --accent: #f59e0b;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --border: rgba(148,163,184,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
header {
  text-align: center; padding: 32px 20px 20px;
  background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(6,182,212,0.06));
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-size: 1.8rem; font-weight: 800;
  background: linear-gradient(135deg, #60a5fa, #06b6d4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
header p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

/* Graph container */
#graphContainer {
  width: 100%; height: calc(100vh - 100px);
  position: relative; overflow: hidden;
}
#graphSVG {
  width: 100%; height: 100%;
  cursor: grab;
}
#graphSVG:active { cursor: grabbing; }

/* Node styles */
.node-group { cursor: pointer; }
.node-circle {
  transition: r 0.2s, fill 0.2s;
}
.node-group:hover .node-circle { filter: brightness(1.3); }
.node-label {
  font-size: 12px; font-weight: 600;
  fill: var(--text); pointer-events: none;
  text-anchor: middle; dominant-baseline: central;
}
.node-grade {
  font-size: 9px; fill: var(--muted);
  text-anchor: middle; dominant-baseline: central;
}
.edge-line {
  stroke: rgba(148,163,184,0.25); stroke-width: 1.5;
  fill: none; marker-end: url(#arrowhead);
}
.edge-prereq { stroke: rgba(59,130,246,0.3); }
.edge-extends { stroke: rgba(34,197,94,0.3); stroke-dasharray: 6,3; }

/* Tooltip */
#tooltip {
  position: fixed; z-index: 100;
  background: rgba(15,23,42,0.95);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 20px;
  max-width: 380px; font-size: 0.88rem;
  pointer-events: none; opacity: 0;
  transition: opacity 0.15s;
  line-height: 1.6;
}
#tooltip.show { opacity: 1; }
#tooltip h3 {
  font-size: 1.05rem; margin-bottom: 6px;
  color: #60a5fa;
}
#tooltip .def { color: var(--text); margin-bottom: 8px; }
#tooltip .meta { color: var(--muted); font-size: 0.8rem; }
#tooltip .concepts { margin-top: 8px; }
#tooltip .concepts li {
  color: var(--muted); font-size: 0.82rem;
  margin-left: 16px; margin-bottom: 2px;
}
#tooltip .bloom { margin-top: 8px; }
#tooltip .bloom span {
  display: inline-block; padding: 2px 8px;
  border-radius: 8px; font-size: 0.72rem;
  margin: 2px; background: rgba(59,130,246,0.15); color: #60a5fa;
}

/* Legend */
.legend {
  position: fixed; bottom: 20px; left: 20px;
  background: var(--card); backdrop-filter: blur(10px);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; font-size: 0.8rem; color: var(--muted);
}
.legend h4 { font-size: 0.85rem; color: var(--text); margin-bottom: 8px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.legend-line { width: 24px; height: 2px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; }

/* Highlight */
.node-group.highlighted .node-circle { stroke: #fbbf24; stroke-width: 3; }
.node-group.dimmed { opacity: 0.3; }
.edge-line.highlighted { stroke: rgba(251,191,36,0.6); stroke-width: 2.5; }
.edge-line.dimmed { opacity: 0.1; }

/* Responsive */
@media (max-width: 600px) {
  header h1 { font-size: 1.3rem; }
  #tooltip { max-width: 280px; }
  .legend { font-size: 0.7rem; padding: 10px 14px; }
}
</style>
</head>
<body>

<header>
  <h1>🗺️ 语文阅读 · 知识图谱</h1>
  <p>人教版（部编版）· 小学至初中 · 悬停查看详情 · 点击高亮关联</p>
</header>

<div id="graphContainer">
  <svg id="graphSVG">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6"
              refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="rgba(148,163,184,0.4)"/>
      </marker>
    </defs>
  </svg>
</div>

<div id="tooltip"></div>

<div class="legend">
  <h4>图例</h4>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> 知识节点</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> 有课件的节点</div>
  <div class="legend-item"><div class="legend-line" style="background:rgba(59,130,246,0.5)"></div> 前置依赖</div>
  <div class="legend-item"><div class="legend-line" style="background:rgba(34,197,94,0.5);border-top:2px dashed rgba(34,197,94,0.5)"></div> 延伸扩展</div>
</div>

<script>
// === Embedded graph data ===
const GRAPH_DATA = {
  "subject": "chinese", "domain": "reading", "version": "1.0",
  "nodes": [
    {"id":"sentence-comprehension","name":"句子理解","grade":"2","definition":"理解句子的意思，能找出句子的主干","key_concepts":["句子主干","关键词语","比喻句拟人句","联系上下文"]},
    {"id":"paragraph-analysis","name":"段落分析","grade":"3","definition":"能概括段落大意，理解段落内部的层次关系","key_concepts":["中心句","总分/分总/总分总","并列与递进","概括方法"]},
    {"id":"rhetorical-devices","name":"修辞手法","grade":"3","definition":"比喻、拟人、夸张、排比、反问、设问","key_concepts":["比喻明喻暗喻","拟人","夸张","排比","反问设问"]},
    {"id":"article-structure","name":"文章结构分析","grade":"4","definition":"从整体把握文章的组织结构，掌握记叙文六要素","key_concepts":["六要素","文章线索","开头结尾照应","过渡段"]},
    {"id":"summarization","name":"概括与归纳","grade":"4","definition":"用简洁的语言提取和概括文章主要内容、中心思想","key_concepts":["概括主要内容","归纳中心思想","提取关键信息","分层概括法"]},
    {"id":"article-appreciation","name":"文学鉴赏","grade":"5","definition":"从语言表达、情感传递、写作手法等角度感受和评价文学作品","key_concepts":["品味语言","体会情感","描写方法","写作手法"]},
    {"id":"reading-comprehension-exam","name":"阅读理解答题方法","grade":"6","definition":"系统掌握各类阅读理解题型的审题技巧和答题方法","key_concepts":["概括类","理解类","赏析类","感悟类"]},
    {"id":"whole-book-reading","name":"整本书阅读","grade":"3-9","definition":"2022课标拓展型学习任务群，综合运用多种方法阅读整本书","key_concepts":["精读与略读","阅读计划","名著导读","阅读分享"]},
    {"id":"erta-stories","name":"朝花夕拾","grade":"7","definition":"鲁迅唯一散文集，收录十篇作品，双重视角回忆往事","key_concepts":["十篇散文三类","六大人物形象","四大写法","双重视角","书名双层意涵"]}
  ],
  "edges": [
    {"from":"sentence-comprehension","to":"paragraph-analysis","type":"prerequisite"},
    {"from":"sentence-comprehension","to":"rhetorical-devices","type":"prerequisite"},
    {"from":"paragraph-analysis","to":"article-structure","type":"prerequisite"},
    {"from":"paragraph-analysis","to":"summarization","type":"prerequisite"},
    {"from":"article-structure","to":"summarization","type":"prerequisite"},
    {"from":"rhetorical-devices","to":"article-appreciation","type":"prerequisite"},
    {"from":"article-structure","to":"article-appreciation","type":"prerequisite"},
    {"from":"summarization","to":"article-appreciation","type":"prerequisite"},
    {"from":"article-appreciation","to":"reading-comprehension-exam","type":"extends"},
    {"from":"article-appreciation","to":"whole-book-reading","type":"extends"},
    {"from":"summarization","to":"whole-book-reading","type":"prerequisite"},
    {"from":"article-appreciation","to":"erta-stories","type":"prerequisite"},
    {"from":"erta-stories","to":"whole-book-reading","type":"extends"}
  ]
};

// Courseware mapping (nodes that have course-registry entries)
const COURSEWARE_NODES = {
  'erta-stories': { url: 'https://github.com/weponusa/teachany-erta-stories', emoji: '📖' }
};

// Layout: simple layered DAG layout
function computeLayout(nodes, edges) {
  // Topological sort to assign layers
  const inDegree = {};
  const adj = {};
  nodes.forEach(n => { inDegree[n.id] = 0; adj[n.id] = []; });
  edges.forEach(e => {
    inDegree[e.to] = (inDegree[e.to] || 0) + 1;
    if (adj[e.from]) adj[e.from].push(e.to);
  });

  const layers = [];
  const remaining = new Set(nodes.map(n => n.id));
  const nodeLayer = {};

  while (remaining.size > 0) {
    const layer = [];
    remaining.forEach(id => {
      if (inDegree[id] === 0) layer.push(id);
    });
    if (layer.length === 0) {
      // Circular dependency - just put remaining in one layer
      remaining.forEach(id => { nodeLayer[id] = layers.length; });
      break;
    }
    layer.forEach(id => {
      nodeLayer[id] = layers.length;
      remaining.delete(id);
      (adj[id] || []).forEach(to => { inDegree[to]--; });
    });
    layers.push(layer);
  }

  // Assign positions
  const svg = document.getElementById('graphSVG');
  const rect = svg.getBoundingClientRect();
  const W = rect.width || 1000;
  const H = rect.height || 700;
  const padX = 120, padY = 80;
  const pos = {};

  layers.forEach((layer, li) => {
    const y = padY + (H - 2 * padY) * (li / Math.max(layers.length - 1, 1));
    layer.forEach((id, ni) => {
      const x = padX + (W - 2 * padX) * ((ni + 0.5) / layer.length);
      pos[id] = { x, y };
    });
  });

  return { pos, nodeLayer, layers };
}

// Render graph
function renderGraph() {
  const svg = document.getElementById('graphSVG');
  const { nodes, edges } = GRAPH_DATA;

  const { pos } = computeLayout(nodes, edges);

  // Draw edges first (behind nodes)
  const edgeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  edgeGroup.id = 'edges';
  edges.forEach(e => {
    const from = pos[e.from];
    const to = pos[e.to];
    if (!from || !to) return;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', from.x);
    line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x);
    line.setAttribute('y2', to.y);
    line.classList.add('edge-line', e.type === 'extends' ? 'edge-extends' : 'edge-prereq');
    line.dataset.from = e.from;
    line.dataset.to = e.to;
    edgeGroup.appendChild(line);
  });
  svg.appendChild(edgeGroup);

  // Draw nodes
  const nodeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  nodeGroup.id = 'nodes';
  nodes.forEach(n => {
    const p = pos[n.id];
    if (!p) return;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.classList.add('node-group');
    g.dataset.id = n.id;
    g.setAttribute('transform', `translate(${p.x}, ${p.y})`);

    const hasCourse = !!COURSEWARE_NODES[n.id];
    const r = hasCourse ? 28 : 22;
    const fill = hasCourse ? '#f59e0b' : '#3b82f6';

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.classList.add('node-circle');
    circle.setAttribute('r', r);
    circle.setAttribute('fill', fill);
    circle.setAttribute('opacity', '0.85');
    g.appendChild(circle);

    if (hasCourse) {
      const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ring.setAttribute('r', r + 4);
      ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', '#fbbf24');
      ring.setAttribute('stroke-width', '2');
      ring.setAttribute('opacity', '0.5');
      g.appendChild(ring);
    }

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.classList.add('node-label');
    label.setAttribute('y', hasCourse ? -2 : 0);
    label.textContent = n.name.length > 4 ? n.name.slice(0, 4) : n.name;
    g.appendChild(label);

    const grade = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    grade.classList.add('node-grade');
    grade.setAttribute('y', hasCourse ? 12 : 14);
    grade.textContent = n.grade + '年级';
    g.appendChild(grade);

    // Interactions
    g.addEventListener('mouseenter', (ev) => showTooltip(ev, n));
    g.addEventListener('mousemove', (ev) => moveTooltip(ev));
    g.addEventListener('mouseleave', hideTooltip);
    g.addEventListener('click', () => highlightNode(n.id));

    nodeGroup.appendChild(g);
  });
  svg.appendChild(nodeGroup);
}

// Tooltip
const tooltip = document.getElementById('tooltip');

function showTooltip(ev, node) {
  const hasCourse = !!COURSEWARE_NODES[node.id];
  const courseLink = hasCourse
    ? `<div style="margin-top:8px"><a href="${COURSEWARE_NODES[node.id].url}" target="_blank" style="color:#60a5fa;text-decoration:none;font-weight:600">📖 打开课件 →</a></div>`
    : '';

  const concepts = (node.key_concepts || []).map(c => `<li>${c}</li>`).join('');
  const bloom = (node.bloom_verbs || {});
  const bloomHtml = Object.entries(bloom).map(([k, v]) =>
    `<span>${k}: ${v}</span>`
  ).join('');

  tooltip.innerHTML = `
    <h3>${node.name} ${hasCourse ? '📖' : ''}</h3>
    <div class="def">${node.definition || ''}</div>
    <div class="meta">${node.grade}年级 · ${node.semester || ''} · ${node.unit || ''}</div>
    ${concepts ? `<div class="concepts"><strong>核心概念：</strong><ul>${concepts}</ul></div>` : ''}
    ${bloomHtml ? `<div class="bloom"><strong>Bloom动词：</strong>${bloomHtml}</div>` : ''}
    ${courseLink}
  `;
  tooltip.classList.add('show');
  moveTooltip(ev);
}

function moveTooltip(ev) {
  let x = ev.clientX + 16;
  let y = ev.clientY + 16;
  if (x + 400 > window.innerWidth) x = ev.clientX - 400;
  if (y + 300 > window.innerHeight) y = ev.clientY - 300;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('show');
}

// Highlight node and connected edges
let highlighted = null;
function highlightNode(nodeId) {
  if (highlighted === nodeId) {
    // Un-highlight
    highlighted = null;
    document.querySelectorAll('.node-group').forEach(g => {
      g.classList.remove('highlighted', 'dimmed');
    });
    document.querySelectorAll('.edge-line').forEach(e => {
      e.classList.remove('highlighted', 'dimmed');
    });
    return;
  }

  highlighted = nodeId;
  const connectedNodes = new Set([nodeId]);
  const connectedEdges = new Set();

  GRAPH_DATA.edges.forEach(e => {
    if (e.from === nodeId || e.to === nodeId) {
      connectedNodes.add(e.from);
      connectedNodes.add(e.to);
      connectedEdges.add(`${e.from}->${e.to}`);
    }
  });

  document.querySelectorAll('.node-group').forEach(g => {
    const id = g.dataset.id;
    g.classList.toggle('highlighted', id === nodeId);
    g.classList.toggle('dimmed', !connectedNodes.has(id));
  });

  document.querySelectorAll('.edge-line').forEach(e => {
    const key = `${e.dataset.from}->${e.dataset.to}`;
    e.classList.toggle('highlighted', connectedEdges.has(key));
    e.classList.toggle('dimmed', !connectedEdges.has(key));
  });
}

// Pan & zoom
function setupPanZoom() {
  const svg = document.getElementById('graphSVG');
  let viewBox = { x: 0, y: 0, w: svg.clientWidth, h: svg.clientHeight };
  let isPanning = false, startPoint = { x: 0, y: 0 };

  function updateViewBox() {
    svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
  }

  svg.addEventListener('pointerdown', e => {
    isPanning = true;
    startPoint = { x: e.clientX, y: e.clientY };
  });

  svg.addEventListener('pointermove', e => {
    if (!isPanning) return;
    const dx = (e.clientX - startPoint.x) * (viewBox.w / svg.clientWidth);
    const dy = (e.clientY - startPoint.y) * (viewBox.h / svg.clientHeight);
    viewBox.x -= dx;
    viewBox.y -= dy;
    startPoint = { x: e.clientX, y: e.clientY };
    updateViewBox();
  });

  svg.addEventListener('pointerup', () => { isPanning = false; });
  svg.addEventListener('pointerleave', () => { isPanning = false; });

  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const scale = e.deltaY > 0 ? 1.08 : 0.93;
    const mx = viewBox.x + (e.clientX / svg.clientWidth) * viewBox.w;
    const my = viewBox.y + (e.clientY / svg.clientHeight) * viewBox.h;
    viewBox.w *= scale;
    viewBox.h *= scale;
    viewBox.x = mx - (e.clientX / svg.clientWidth) * viewBox.w;
    viewBox.y = my - (e.clientY / svg.clientHeight) * viewBox.h;
    updateViewBox();
  }, { passive: false });
}

// Init
renderGraph();
setupPanZoom();

// Resize handler
window.addEventListener('resize', () => {
  const svg = document.getElementById('graphSVG');
  // Clear and re-render
  svg.querySelectorAll('#edges, #nodes').forEach(g => g.remove());
  renderGraph();
});
</script>
</body>
</html>
